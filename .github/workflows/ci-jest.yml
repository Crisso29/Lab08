# .github/workflows/ci-jest.yml
# Pipeline 1: ejecuta SOLO los tests unitarios de Jest en cada Push a main

name: CI — Tests Unitarios Jest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-unitarios:
    name: Ejecutar suite Jest
    runs-on: ubuntu-latest

    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      # Jest 30: usa --testPathPatterns (plural) en lugar de --testPathPattern
      - name: Ejecutar tests unitarios
        run: npx jest --testPathPatterns="UnitTest"
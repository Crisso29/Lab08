# .github/workflows/ci-jest.yml
# Pipeline 1: tests unitarios + Quality Gate de cobertura

name: CI — Tests Unitarios Jest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-unitarios:
    name: Ejecutar suite Jest
    runs-on: ubuntu-latest

    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      # Quality Gate: falla si la cobertura baja de los umbrales definidos
      # en package.json (statements 90%, branches 85%, functions 100%, lines 95%)
      - name: Ejecutar tests unitarios con Quality Gate
        run: npx jest --testPathPatterns="UnitTest" --coverage

      # Subir el reporte de cobertura como artefacto descargable
      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7